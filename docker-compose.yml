services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      REFRAME_WORK_DIR: /tmp/reframe
      REFRAME_CORS_ORIGINS: '["http://localhost:3000"]'
    tmpfs:
      - /tmp/reframe   # temp artifacts never touch a persistent volume

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
